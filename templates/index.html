<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowTrace - IP Geolocation Dashboard</title>
    <!-- Google Fonts: Inter & Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-primary: #4f46e5;
            --accent-secondary: #7c3aed;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, var(--bg-color) 100%);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .logo {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: "🌐";
            font-size: 1.4rem;
        }

        .badge {
            background: rgba(79, 70, 229, 0.08);
            color: var(--accent-primary);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(79, 70, 229, 0.15);
        }

        main {
            display: grid;
            grid-template-columns: 420px 1fr;
            flex-grow: 1;
            height: calc(100vh - 69px);
            position: relative;
        }

        /* Sidebar Control Center */
        .sidebar {
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 2.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
            overflow-y: auto;
            z-index: 5;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
        }

        .search-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .search-title {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .input-group {
            position: relative;
            display: flex;
            gap: 0.5rem;
        }

        .input-group input {
            flex-grow: 1;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease-in-out;
        }

        .input-group input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
            background: #ffffff;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font-main);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #475569;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: var(--text-primary);
            box-shadow: none;
            transform: none;
        }

        /* Results Card */
        .results-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .results-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .info-item:last-child {
            border: none;
            padding: 0;
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            text-align: right;
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Status States */
        .status-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            gap: 1rem;
        }

        .status-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-error {
            color: var(--accent-red);
            font-size: 0.9rem;
            display: none;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }

        /* Map Container */
        .map-wrapper {
            position: relative;
            height: 100%;
            width: 100%;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #f1f5f9;
        }

        /* Custom Map Marker styles */
        .custom-marker {
            width: 20px;
            height: 20px;
            background: var(--accent-primary);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.6);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(79, 70, 229, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(79, 70, 229, 0);
            }
        }

        /* Leaflet style overrides */
        .leaflet-bar {
            border: 1px solid var(--border-color) !important;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05) !important;
        }

        .leaflet-bar a {
            background-color: var(--card-bg) !important;
            color: var(--text-primary) !important;
            border-bottom: 1px solid var(--border-color) !important;
            transition: all 0.2s ease;
        }

        .leaflet-bar a:hover {
            background-color: #f8fafc !important;
            color: var(--accent-primary) !important;
        }

        /* Responsive */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: auto 400px;
                height: auto;
            }
            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                height: auto;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ShadowTrace</div>
        <div class="badge">Tracker v2.2</div>
    </header>

    <main>
        <div class="sidebar">
            <div class="search-container">
                <div class="search-title">Query IP Address</div>
                <div class="input-group">
                    <input type="text" id="ip-input" placeholder="e.g. 8.8.8.8 (Leave empty for yours)">
                    <button class="btn" id="search-btn">Locate</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                    <button class="btn btn-secondary" id="my-ip-btn">Use My IP</button>
                    <button class="btn btn-secondary" id="gps-btn" style="border-color: rgba(79, 70, 229, 0.2); color: var(--accent-primary);">Get Precise GPS</button>
                </div>
            </div>

            <!-- Loader -->
            <div class="status-container" id="status-loader">
                <div class="status-spinner"></div>
                <div class="status-text">Resolving geolocation details...</div>
            </div>

            <!-- Error message -->
            <div class="status-error" id="status-error">
                Failed to resolve IP location. Please try a valid IP address.
            </div>

            <!-- Results -->
            <div class="results-card" id="results-card">
                <div style="font-family: var(--font-heading); font-weight: 700; font-size: 1.3rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; color: var(--accent-primary);" id="result-ip">
                    8.8.8.8
                </div>
                <div class="info-grid" id="info-grid">
                </div>
            </div>
        </div>

        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </main>

    <!-- Leaflet.js JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Initialize Map
        const map = L.map('map', {
            zoomControl: true,
            attributionControl: false
        }).setView([20, 0], 2);

        // Load Voyager Light Theme Map Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        let activeMarker = null;

        // Custom pulsed marker icon
        const pulsingIcon = L.divIcon({
            className: 'custom-marker-wrapper',
            html: '<div class="custom-marker"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        // DOM elements
        const ipInput = document.getElementById('ip-input');
        const searchBtn = document.getElementById('search-btn');
        const myIpBtn = document.getElementById('my-ip-btn');
        const gpsBtn = document.getElementById('gps-btn');
        const loader = document.getElementById('status-loader');
        const errorDiv = document.getElementById('status-error');
        const resultsCard = document.getElementById('results-card');

        const resIp = document.getElementById('result-ip');
        const infoGrid = document.getElementById('info-grid');

        // Functions
        async function locateIP(ip = "") {
            // Reset UI states
            errorDiv.style.display = 'none';
            resultsCard.classList.remove('active');
            loader.style.display = 'flex';

            try {
                const url = ip ? `/api/location?ip=${encodeURIComponent(ip)}` : '/api/location';
                const response = await fetch(url);
                if (!response.ok) throw new Error("API network error");
                
                const data = await response.json();
                
                if (!data || data.status !== 'success') {
                    throw new Error("Failed to find location");
                }

                // Render values dynamically
                resIp.textContent = data.query;
                infoGrid.innerHTML = ''; // Clear previous

                const fieldLabels = {
                    'country': 'Country',
                    'countryCode': 'Country Code',
                    'region': 'Region Code',
                    'regionName': 'Region',
                    'city': 'City',
                    'zip': 'Zip Code',
                    'timezone': 'Timezone',
                    'isp': 'ISP',
                    'org': 'Organization',
                    'as': 'ASN'
                };

                // Add Coordinates first
                if (typeof data.lat === 'number' && typeof data.lon === 'number') {
                    const coordsRow = document.createElement('div');
                    coordsRow.className = 'info-item';
                    coordsRow.innerHTML = `
                        <span class="info-label">Coordinates</span>
                        <span class="info-value">${data.lat.toFixed(4)}, ${data.lon.toFixed(4)}</span>
                    `;
                    infoGrid.appendChild(coordsRow);
                }

                // Add all other returned fields
                for (const [key, value] of Object.entries(data)) {
                    if (['status', 'query', 'lat', 'lon'].includes(key)) continue;

                    const label = fieldLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                    const row = document.createElement('div');
                    row.className = 'info-item';
                    row.innerHTML = `
                        <span class="info-label">${label}</span>
                        <span class="info-value" title="${value || ''}">${value || '-'}</span>
                    `;
                    infoGrid.appendChild(row);
                }

                // Update Map
                const lat = data.lat;
                const lon = data.lon;

                if (activeMarker) {
                    map.removeLayer(activeMarker);
                }

                activeMarker = L.marker([lat, lon], { icon: pulsingIcon }).addTo(map);
                
                // Animate pan and zoom
                map.flyTo([lat, lon], 12, {
                    animate: true,
                    duration: 1.5
                });

                // Show Results Card
                loader.style.display = 'none';
                resultsCard.classList.add('active');

            } catch (err) {
                console.error(err);
                loader.style.display = 'none';
                errorDiv.style.display = 'block';
            }
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            locateIP(ipInput.value.trim());
        });

        ipInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                locateIP(ipInput.value.trim());
            }
        });

        myIpBtn.addEventListener('click', () => {
            ipInput.value = '';
            locateIP('');
        });

        async function locateGPS() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser");
                return;
            }
            
            errorDiv.style.display = 'none';
            resultsCard.classList.remove('active');
            loader.style.display = 'flex';
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const accuracy = position.coords.accuracy;
                
                try {
                    // Try to get network carrier info from the backend IP API
                    const response = await fetch('/api/location');
                    const data = response.ok ? await response.json() : {};
                    
                    resIp.textContent = data.query || "Local GPS";
                    infoGrid.innerHTML = '';
                    
                    // Coordinates row showing GPS flag
                    const coordsRow = document.createElement('div');
                    coordsRow.className = 'info-item';
                    coordsRow.innerHTML = `
                        <span class="info-label">Coordinates</span>
                        <span class="info-value" style="color: var(--accent-primary); font-weight: 700;">
                            ${lat.toFixed(6)}, ${lon.toFixed(6)} (GPS)
                        </span>
                    `;
                    infoGrid.appendChild(coordsRow);

                    // GPS Accuracy row
                    const accuracyRow = document.createElement('div');
                    accuracyRow.className = 'info-item';
                    accuracyRow.innerHTML = `
                        <span class="info-label">Accuracy</span>
                        <span class="info-value">± ${accuracy.toFixed(0)} meters</span>
                    `;
                    infoGrid.appendChild(accuracyRow);
                    
                    const fieldLabels = {
                        'country': 'Country',
                        'countryCode': 'Country Code',
                        'region': 'Region Code',
                        'regionName': 'Region',
                        'city': 'City',
                        'zip': 'Zip Code',
                        'timezone': 'Timezone',
                        'isp': 'ISP',
                        'org': 'Organization',
                        'as': 'ASN'
                    };
                    
                    for (const [key, value] of Object.entries(data)) {
                        if (['status', 'query', 'lat', 'lon'].includes(key)) continue;
                        const label = fieldLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                        const row = document.createElement('div');
                        row.className = 'info-item';
                        row.innerHTML = `
                            <span class="info-label">${label}</span>
                            <span class="info-value" title="${value || ''}">${value || '-'}</span>
                        `;
                        infoGrid.appendChild(row);
                    }
                    
                    // Update Marker & Map location
                    if (activeMarker) {
                        map.removeLayer(activeMarker);
                    }
                    activeMarker = L.marker([lat, lon], { icon: pulsingIcon }).addTo(map);
                    map.flyTo([lat, lon], 16, { // Closer zoom for GPS accuracy
                        animate: true,
                        duration: 1.5
                    });
                    
                    loader.style.display = 'none';
                    resultsCard.classList.add('active');
                } catch (err) {
                    console.error(err);
                    loader.style.display = 'none';
                    errorDiv.style.display = 'block';
                }
            }, (error) => {
                loader.style.display = 'none';
                alert(`GPS Geolocation failed: ${error.message}. Please enable location permissions.`);
            }, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }

        gpsBtn.addEventListener('click', locateGPS);

        // Initial load: locate user's current IP location
        locateIP('');
    </script>
</body>
</html>
