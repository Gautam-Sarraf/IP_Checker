<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowTrace - IP Geolocation Dashboard</title>
    <!-- Google Fonts: Inter & Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-primary: #4f46e5;
            --accent-secondary: #7c3aed;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, var(--bg-color) 100%);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .logo {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: "🌐";
            font-size: 1.4rem;
        }

        .badge {
            background: rgba(79, 70, 229, 0.08);
            color: var(--accent-primary);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(79, 70, 229, 0.15);
        }

        main {
            display: grid;
            grid-template-columns: 500px 1fr;
            flex-grow: 1;
            height: calc(100vh - 69px);
            position: relative;
        }

        /* Sidebar Split Layout */
        .sidebar {
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 70px 1fr;
            height: 100%;
            overflow: hidden;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
        }

        /* Slim Left Tab Rail */
        .tab-rail {
            background: #f8fafc;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 0;
            gap: 1.25rem;
        }

        .tab-btn {
            background: none;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
        }

        .tab-btn:hover {
            background: #f1f5f9;
            color: var(--accent-primary);
        }

        .tab-btn.active {
            background: rgba(79, 70, 229, 0.08);
            color: var(--accent-primary);
        }

        /* Active Tab indicator border */
        .tab-btn.active::before {
            content: "";
            position: absolute;
            left: 0;
            top: 25%;
            height: 50%;
            width: 3px;
            background: var(--accent-primary);
            border-radius: 0 4px 4px 0;
        }

        /* Main Sidebar Content Area */
        .tab-content-area {
            padding: 2.25rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
            height: 100%;
        }

        .tab-panel {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.25s ease-in-out;
        }

        .tab-panel.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .search-title {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .input-group {
            position: relative;
            display: flex;
            gap: 0.5rem;
        }

        .input-group input {
            flex-grow: 1;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease-in-out;
        }

        .input-group input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
            background: #ffffff;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font-main);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #475569;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: var(--text-primary);
            box-shadow: none;
            transform: none;
        }

        /* Results Card */
        .results-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .results-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .info-item:last-child {
            border: none;
            padding: 0;
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            text-align: right;
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Status States */
        .status-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            gap: 1rem;
        }

        .status-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-error {
            color: var(--accent-red);
            font-size: 0.9rem;
            display: none;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }

        /* Map Container */
        .map-wrapper {
            position: relative;
            height: 100%;
            width: 100%;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #f1f5f9;
        }

        /* Custom Map Marker styles */
        .custom-marker {
            width: 20px;
            height: 20px;
            background: var(--accent-primary);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.6);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(79, 70, 229, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(79, 70, 229, 0);
            }
        }

        /* Leaflet style overrides */
        .leaflet-bar {
            border: 1px solid var(--border-color) !important;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05) !important;
        }

        .leaflet-bar a {
            background-color: var(--card-bg) !important;
            color: var(--text-primary) !important;
            border-bottom: 1px solid var(--border-color) !important;
            transition: all 0.2s ease;
        }

        .leaflet-bar a:hover {
            background-color: #f8fafc !important;
            color: var(--accent-primary) !important;
        }

        /* Responsive */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: auto 400px;
                height: auto;
            }
            .sidebar {
                grid-template-columns: 60px 1fr;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                height: auto;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ShadowTrace</div>
        <div class="badge">Tracker v2.3</div>
    </header>

    <main>
        <div class="sidebar">
            <!-- Vertical Tab Rail -->
            <div class="tab-rail">
                <button class="tab-btn active" id="tab-lookup-btn" title="Lookup IP">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <button class="tab-btn" id="tab-visitor-btn" title="Visitor Profile">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </button>
            </div>

            <!-- Content Area -->
            <div class="tab-content-area">
                <!-- Panel 1: IP Lookup -->
                <div class="tab-panel active" id="panel-lookup">
                    <div class="search-container">
                        <div class="search-title">Query IP Address</div>
                        <div class="input-group">
                            <input type="text" id="ip-input" placeholder="e.g. 8.8.8.8">
                            <button class="btn" id="search-btn">Locate</button>
                        </div>
                    </div>

                    <!-- Loader -->
                    <div class="status-container" id="status-loader-lookup">
                        <div class="status-spinner"></div>
                        <div class="status-text">Resolving geolocation details...</div>
                    </div>

                    <!-- Error -->
                    <div class="status-error" id="status-error-lookup">
                        Failed to resolve IP location. Please try a valid IP address.
                    </div>

                    <!-- Results Card -->
                    <div class="results-card" id="results-card-lookup">
                        <div style="font-family: var(--font-heading); font-weight: 700; font-size: 1.3rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; color: var(--accent-primary);" id="result-ip-lookup">
                            -
                        </div>
                        <div class="info-grid" id="info-grid-lookup">
                        </div>
                    </div>
                </div>

                <!-- Panel 2: Visitor Profile -->
                <div class="tab-panel" id="panel-visitor">
                    <div class="search-container">
                        <div class="search-title">Visitor Geolocation</div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                            <button class="btn" id="my-ip-btn">Use My IP</button>
                            <button class="btn btn-secondary" id="gps-btn" style="border-color: rgba(79, 70, 229, 0.2); color: var(--accent-primary);">Get Precise GPS</button>
                        </div>
                    </div>

                    <!-- Loader -->
                    <div class="status-container" id="status-loader-visitor">
                        <div class="status-spinner"></div>
                        <div class="status-text">Detecting visitor location...</div>
                    </div>

                    <!-- Error -->
                    <div class="status-error" id="status-error-visitor">
                        Failed to detect visitor location. Please refresh.
                    </div>

                    <!-- Results Card -->
                    <div class="results-card" id="results-card-visitor">
                        <div style="font-family: var(--font-heading); font-weight: 700; font-size: 1.3rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; color: var(--accent-primary);" id="result-ip-visitor">
                            -
                        </div>
                        <div class="info-grid" id="info-grid-visitor">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </main>

    <!-- Leaflet.js JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Initialize Map
        const map = L.map('map', {
            zoomControl: true,
            attributionControl: false
        }).setView([20, 0], 2);

        // Load Voyager Light Theme Map Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        let activeMarker = null;

        // Custom pulsed marker icon
        const pulsingIcon = L.divIcon({
            className: 'custom-marker-wrapper',
            html: '<div class="custom-marker"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        // DOM elements
        const tabLookupBtn = document.getElementById('tab-lookup-btn');
        const tabVisitorBtn = document.getElementById('tab-visitor-btn');
        const panelLookup = document.getElementById('panel-lookup');
        const panelVisitor = document.getElementById('panel-visitor');

        // Lookup elements
        const ipInput = document.getElementById('ip-input');
        const searchBtn = document.getElementById('search-btn');
        const loaderLookup = document.getElementById('status-loader-lookup');
        const errorLookup = document.getElementById('status-error-lookup');
        const resultsCardLookup = document.getElementById('results-card-lookup');
        const resIpLookup = document.getElementById('result-ip-lookup');
        const infoGridLookup = document.getElementById('info-grid-lookup');

        // Visitor elements
        const myIpBtn = document.getElementById('my-ip-btn');
        const gpsBtn = document.getElementById('gps-btn');
        const loaderVisitor = document.getElementById('status-loader-visitor');
        const errorVisitor = document.getElementById('status-error-visitor');
        const resultsCardVisitor = document.getElementById('results-card-visitor');
        const resIpVisitor = document.getElementById('result-ip-visitor');
        const infoGridVisitor = document.getElementById('info-grid-visitor');

        // Field label mapping
        const fieldLabels = {
            'country': 'Country',
            'countryCode': 'Country Code',
            'region': 'Region Code',
            'regionName': 'Region',
            'city': 'City',
            'zip': 'Zip Code',
            'timezone': 'Timezone',
            'isp': 'ISP',
            'org': 'Organization',
            'as': 'ASN'
        };

        // Cache coordinates to center map when switching tabs
        let coordinatesCache = {
            lookup: null,
            visitor: null
        };

        // Helper to update map coordinates
        function updateMap(lat, lon, zoom = 12) {
            if (activeMarker) {
                map.removeLayer(activeMarker);
            }
            activeMarker = L.marker([lat, lon], { icon: pulsingIcon }).addTo(map);
            map.flyTo([lat, lon], zoom, {
                animate: true,
                duration: 1.5
            });
        }

        // Core locate IP logic
        async function locateIP(ip = "", type = "lookup") {
            const isLookup = type === "lookup";
            const loader = isLookup ? loaderLookup : loaderVisitor;
            const errorDiv = isLookup ? errorLookup : errorVisitor;
            const resultsCard = isLookup ? resultsCardLookup : resultsCardVisitor;
            const resIp = isLookup ? resIpLookup : resIpVisitor;
            const infoGrid = isLookup ? infoGridLookup : infoGridVisitor;

            errorDiv.style.display = 'none';
            resultsCard.classList.remove('active');
            loader.style.display = 'flex';

            try {
                // If ip is empty, resolve it using ipify first
                if (!ip) {
                    try {
                        const ipifyRes = await fetch('https://api64.ipify.org?format=json');
                        if (ipifyRes.ok) {
                            const ipifyData = await ipifyRes.json();
                            ip = ipifyData.ip;
                        }
                    } catch (e) {
                        console.warn("ipify failed, falling back to server IP detection:", e);
                    }
                }

                const url = ip ? `/api/location?ip=${encodeURIComponent(ip)}` : '/api/location';
                const response = await fetch(url);
                if (!response.ok) throw new Error("API network error");
                
                const data = await response.json();
                
                if (!data || data.status !== 'success') {
                    throw new Error("Failed to find location");
                }

                // Render values
                resIp.textContent = data.query;
                infoGrid.innerHTML = '';

                // Add Coordinates
                if (typeof data.lat === 'number' && typeof data.lon === 'number') {
                    const coordsRow = document.createElement('div');
                    coordsRow.className = 'info-item';
                    coordsRow.innerHTML = `
                        <span class="info-label">Coordinates</span>
                        <span class="info-value">${data.lat.toFixed(4)}, ${data.lon.toFixed(4)}</span>
                    `;
                    infoGrid.appendChild(coordsRow);
                    
                    coordinatesCache[type] = { lat: data.lat, lon: data.lon, zoom: 12 };
                    updateMap(data.lat, data.lon, 12);
                }

                // Add other metadata
                for (const [key, value] of Object.entries(data)) {
                    if (['status', 'query', 'lat', 'lon'].includes(key)) continue;

                    const label = fieldLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                    const row = document.createElement('div');
                    row.className = 'info-item';
                    row.innerHTML = `
                        <span class="info-label">${label}</span>
                        <span class="info-value" title="${value || ''}">${value || '-'}</span>
                    `;
                    infoGrid.appendChild(row);
                }

                loader.style.display = 'none';
                resultsCard.classList.add('active');

            } catch (err) {
                console.error(err);
                loader.style.display = 'none';
                errorDiv.style.display = 'block';
            }
        }

        // HTML5 Precise GPS lookup
        async function locateGPS() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser");
                return;
            }
            
            errorVisitor.style.display = 'none';
            resultsCardVisitor.classList.remove('active');
            loaderVisitor.style.display = 'flex';
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const accuracy = position.coords.accuracy;
                
                try {
                    // Try to resolve exact client IP via ipify first to fetch proper network ISP info
                    let ip = "";
                    try {
                        const ipifyRes = await fetch('https://api64.ipify.org?format=json');
                        if (ipifyRes.ok) {
                            const ipifyData = await ipifyRes.json();
                            ip = ipifyData.ip;
                        }
                    } catch (e) {
                        console.warn("ipify failed:", e);
                    }

                    const url = ip ? `/api/location?ip=${encodeURIComponent(ip)}` : '/api/location';
                    const response = await fetch(url);
                    const data = response.ok ? await response.json() : {};
                    
                    resIpVisitor.textContent = data.query || "Local GPS";
                    infoGridVisitor.innerHTML = '';
                    
                    // Coordinates row showing GPS
                    const coordsRow = document.createElement('div');
                    coordsRow.className = 'info-item';
                    coordsRow.innerHTML = `
                        <span class="info-label">Coordinates</span>
                        <span class="info-value" style="color: var(--accent-primary); font-weight: 700;">
                            ${lat.toFixed(6)}, ${lon.toFixed(6)} (GPS)
                        </span>
                    `;
                    infoGridVisitor.appendChild(coordsRow);

                    // GPS Accuracy row
                    const accuracyRow = document.createElement('div');
                    accuracyRow.className = 'info-item';
                    accuracyRow.innerHTML = `
                        <span class="info-label">Accuracy</span>
                        <span class="info-value">± ${accuracy.toFixed(0)} meters</span>
                    `;
                    infoGridVisitor.appendChild(accuracyRow);
                    
                    for (const [key, value] of Object.entries(data)) {
                        if (['status', 'query', 'lat', 'lon'].includes(key)) continue;
                        const label = fieldLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                        const row = document.createElement('div');
                        row.className = 'info-item';
                        row.innerHTML = `
                            <span class="info-label">${label}</span>
                            <span class="info-value" title="${value || ''}">${value || '-'}</span>
                        `;
                        infoGridVisitor.appendChild(row);
                    }
                    
                    coordinatesCache.visitor = { lat, lon, zoom: 16 };
                    updateMap(lat, lon, 16);
                    
                    loaderVisitor.style.display = 'none';
                    resultsCardVisitor.classList.add('active');
                } catch (err) {
                    console.error(err);
                    loaderVisitor.style.display = 'none';
                    errorVisitor.style.display = 'block';
                }
            }, (error) => {
                loaderVisitor.style.display = 'none';
                alert(`GPS Geolocation failed: ${error.message}. Please enable location permissions.`);
            }, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }

        // Tab Switching Logic
        tabLookupBtn.addEventListener('click', () => {
            tabLookupBtn.classList.add('active');
            tabVisitorBtn.classList.remove('active');
            panelLookup.classList.add('active');
            panelVisitor.classList.remove('active');
            
            // Fly map back to lookup coords if exist
            if (coordinatesCache.lookup) {
                updateMap(coordinatesCache.lookup.lat, coordinatesCache.lookup.lon, coordinatesCache.lookup.zoom);
            }
        });

        tabVisitorBtn.addEventListener('click', () => {
            tabVisitorBtn.classList.add('active');
            tabLookupBtn.classList.remove('active');
            panelVisitor.classList.add('active');
            panelLookup.classList.remove('active');
            
            // Trigger automatic visitor detection on first click if empty
            if (!coordinatesCache.visitor) {
                locateIP("", "visitor");
            } else {
                updateMap(coordinatesCache.visitor.lat, coordinatesCache.visitor.lon, coordinatesCache.visitor.zoom);
            }
        });

        // Event listeners
        searchBtn.addEventListener('click', () => {
            locateIP(ipInput.value.trim(), "lookup");
        });

        ipInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                locateIP(ipInput.value.trim(), "lookup");
            }
        });

        myIpBtn.addEventListener('click', () => {
            locateIP('', 'visitor');
        });

        gpsBtn.addEventListener('click', locateGPS);

        // Initial setup: Load default coordinates or auto-detect in Lookup tab
        locateIP('8.8.8.8', 'lookup'); // Default startup IP query to initialize the dashboard cleanly
    </script>
</body>
</html>
